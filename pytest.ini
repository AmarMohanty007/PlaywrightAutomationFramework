;---------------------------------------------
; This is the pytest configuration file for the OpenCart test automation framework.
; It contains various settings and options to customize the behavior of pytest when running tests.
; The configuration includes options for browser selection, test execution mode, video recording, screenshot capture,
; tracing, reporting, and more.
;---------------------------------------------

[pytest]

addopts =
; ----------------------------
;        General Options
; ----------------------------
;: verbose - Run tests in verbose mode (shows detailed test names and results)
          -v
;: Specify browser type (chromium, firefox, webkit, or msedge)
          --browser=chromium
;: Run tests in headed mode (shows browser UI)
          --headed
;: Define the base URL for all tests
          --base-url=https://tutorialsninja.com/demo/

;------------------------------------------
;        Captures and Reports (Debugging)
;------------------------------------------

;: Record video only if the test fails
          --video=retain-on-failure
; --video=on - Record video for all tests regardless of outcome
;: Capture screenshot only on failure
          --screenshot=only-on-failure
; --screenshot=on - Capture screenshot for all tests regardless of outcome
;: Save Playwright trace file only if the test fails
          --tracing=on
; --tracing=on - Save trace file for all tests regardless of outcome
; : Generate HTML reports for test results
          --html=reports/report.html
; : Embed all report assets (CSS, JS, images) inside the HTML report for portability
          --self-contained-html
; : Display console logs while also capturing them for reports
          --capture=tee-sys
; : Generate Allure-compatible results for advanced reporting with Allure framework
          --alluredir=reports/allure-results

;--------------------------------------
;      Parallel    Execution Options
;--------------------------------------
; :Run tests parallel with 1 worker (process) or specify the number of workers to use for parallel test execution
;          -n=1
; : Run tests in parallel using multiple processes (uncomment to enable)
;          --numprocesses=1

;--------------------------------------
;      Test Grouping Options (Markers and Keywords)
;--------------------------------------
; : Run tests that match a specific keyword expression (uncomment to enable)
;          -k "keyword_expression"
; : Run tests that are marked with a specific marker (uncomment to enable)
;          -m "marker_name"
           -m "sanity"
;           -m "data_driven"
;           -m "end_to_end"
;           -m "sanity and regression"
; : Example of running tests marked as "smoke" and not marked as "slow"
;          -m "smoke and not slow"
; : Example of running tests that match a keyword expression (e.g., tests containing "login" in their name)
;          -k "login"
; : Example of running tests that are marked as "regression" or "sanity"
;          -m "regression or sanity"
; : Example of running tests that are marked as "smoke" and also match a keyword expression (e.g., tests containing "checkout" in their name)
;          -m "smoke" -k "checkout"
; : Example of running tests that are marked as "smoke" but not marked as "slow" and also match a keyword expression (e.g., tests containing "payment" in their name)
;          -m "smoke and not slow" -k "payment"
; : Example of running tests that are marked as "regression" or "sanity" and also match a keyword expression (e.g., tests containing "search" in their name)
;          -m "regression or sanity" -k "search"
; : Example of running tests that are marked as "smoke" or "regression" and also match a keyword expression (e.g., tests containing "cart" in their name)
;          -m "smoke or regression" -k "cart"
; : Example of running tests that are marked as "smoke" but not marked as "slow" and also match a keyword expression (e.g., tests containing "wishlist" in their name)
;          -m "smoke and not slow" -k "wishlist"
; : Example of running tests that are marked as "regression" but not marked as "sanity" and also match a keyword expression (e.g., tests containing "profile" in their name)
;          -m "regression and not sanity" -k "profile"
; : Example of running tests that are marked as "smoke" or "regression" but not marked as "slow" and also match a keyword expression (e.g., tests containing "order" in their name)
;          -m "smoke or regression and not slow" -k "order"


;--------------------------------------------------
;      Custom Markers (Uncomment and define your custom markers here)
;--------------------------------------------------
; : Define custom markers for categorizing tests (uncomment and customize as needed)
markers =
     sanity:       Mark test as part of the sanity test suite
     regression:   Mark test as part of the regression test suite
     smoke:        Mark test as part of the smoke test suite
     data_driven:  Mark test as data-driven (useful for parameterized tests)
     end_to_end:   Mark test as an end-to-end test
     slow:         Mark test as slow-running (use with caution in parallel execution)

;--------------------------------------------------
;           Flaky Test Handling Options
;--------------------------------------------------
; : Retry failed tests up to a specified number of times (uncomment to enable)
;          --reruns=2
; : Wait time before retrying failed tests (in seconds, uncomment to enable)
;          --reruns-delay=5
